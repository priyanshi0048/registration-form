<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registration Form - Version 2</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* SPLIT SCREEN BACKGROUND */
body {
  display: flex;
  height: 100vh;
}

/* LEFT SIDE (INFO PANEL) */
.left {
  flex: 1;
  background: linear-gradient(135deg, #1d2671, #c33764);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 30px;
}

.left h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.left p {
  font-size: 18px;
  opacity: 0.9;
}

/* RIGHT SIDE (FORM) */
.right {
  flex: 1;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* GLASS FORM */
.form-container {
  width: 90%;
  max-width: 380px;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* HEADING */
.form-container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #c33764;
  box-shadow: 0 0 5px rgba(195,55,100,0.4);
}

/* PASSWORD BOX */
.password-box {
  position: relative;
}

.password-box span {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* GENDER */
.gender-group {
  margin: 10px 0;
}

.gender-group label {
  margin-right: 10px;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #1d2671, #c33764);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* RESPONSIVE */
@media(max-width: 768px) {
  body {
    flex-direction: column;
  }
  .left {
    height: 30vh;
  }
}
</style>

</head>
<body>

<!-- LEFT PANEL -->
<div class="left">
  <div>
    <h1>Welcome 🎉</h1>
    <p>Create your account and start your journey with us.</p>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right">
  <div class="form-container">
    <h2>Register</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required />

      <input type="email" id="email" placeholder="Email Address" required />

      <div class="password-box">
        <input type="password" id="password" placeholder="Password" required />
        <span onclick="togglePassword('password', this)">👁</span>
      </div>

      <div class="password-box">
        <input type="password" id="confirm" placeholder="Confirm Password" required />
        <span onclick="togglePassword('confirm', this)">👁</span>
      </div>

      <div class="gender-group">
        <label><input type="radio" name="gender" required /> Male</label>
        <label><input type="radio" name="gender" /> Female</label>
        <label><input type="radio" name="gender" /> Other</label>
      </div>

      <select required>
        <option value="" disabled selected>Select Course</option>
        <option>Web Development</option>
        <option>App Development</option>
        <option>Data Science</option>
      </select>

      <button type="submit">Create Account</button>
    </form>
  </div>
</div>

<script>
function togglePassword(id, icon) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    icon.textContent = "🙈";
  } else {
    input.type = "password";
    icon.textContent = "👁";
  }
}

document.getElementById("registerForm").addEventListener("submit", function(e) {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  if (!email.includes("@")) {
    alert("Enter valid email");
    e.preventDefault();
    return;
  }

  if (password.length < 6) {
    alert("Password must be at least 6 characters");
    e.preventDefault();
    return;
  }

  if (password !== confirm) {
    alert("Passwords do not match");
    e.preventDefault();
    return;
  }

  alert("Registration Successful 🎉");
});
</script>

</body>
</html>
