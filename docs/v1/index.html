<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Registration Form</title>
<style>
  /* Background gradient covering full viewport */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* White form container box */
  .form-container {
    background: white;
    border-radius: 16px;
    width: 90%;
    max-width: 400px;
    padding: 30px 25px 35px 25px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    box-sizing: border-box;
  }

  /* Centered heading */
  .form-container h2 {
    margin: 0 0 20px 0;
    text-align: center;
    font-weight: 700;
    font-size: 28px;
    color: #222;
  }

  /* Full width inputs with nice spacing */
  input[type="text"],
  input[type="email"],
  input[type="password"],
  select {
    width: 100%;
    padding: 14px 15px;
    margin: 10px 0 18px 0;
    font-size: 16px;
    border: 1.8px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.25s ease;
  }

  /* Focus effect on inputs */
  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="password"]:focus,
  select:focus {
    border-color: #667eea;
  }

  /* Password input wrapper to position eye icon */
  .password-box {
    position: relative;
  }

  .password-box input {
    padding-right: 45px; /* space for eye icon */
  }

  /* Eye icon style */
  .password-box span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    user-select: none;
    font-size: 20px;
    color: #888;
    transition: color 0.3s ease;
  }

  .password-box span:hover {
    color: #667eea;
  }

  /* Gender radio group container */
  .gender-group {
    margin-bottom: 18px;
    font-size: 14px;
    color: #222;
  }
  .gender-group label {
    margin-right: 18px;
    cursor: pointer;
    font-weight: 500;
  }
  .gender-group input[type="radio"] {
    margin-right: 5px;
    cursor: pointer;
  }

  /* Dropdown styling */
  select {
    cursor: pointer;
  }

  /* Register button styling */
  button {
    width: 100%;
    padding: 16px 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 25px;
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(102, 126, 234, 0.6);
    transition: opacity 0.3s ease;
  }
  button:hover {
    opacity: 0.9;
  }

  /* Responsive adjustments for very small screens */
  @media (max-width: 320px) {
    .form-container {
      padding: 25px 15px 30px 15px;
    }
    button {
      font-size: 16px;
      padding: 14px 0;
    }
  }
</style>
</head>
<body>

<div class="form-container">
  <h2>Register Now</h2>

  <form id="registerForm">
    <input type="text" id="name" name="name" placeholder="Full Name" required />

    <input type="email" id="email" name="email" placeholder="Email Address" required />

    <div class="password-box">
      <input type="password" id="password" name="password" placeholder="Password" required />
      <span onclick="togglePassword('password', this)">👁</span>
    </div>

    <div class="password-box">
      <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" required />
      <span onclick="togglePassword('confirm', this)">👁</span>
    </div>

    <div class="gender-group">
      Gender:
      <label><input type="radio" name="gender" value="male" required /> Male</label>
      <label><input type="radio" name="gender" value="female" /> Female</label>
      <label><input type="radio" name="gender" value="other" /> Other</label>
    </div>

    <select name="course" required>
      <option value="" disabled selected>Course / Interest</option>
      <option value="web">Web Development</option>
      <option value="mobile">Mobile Development</option>
      <option value="data">Data Science</option>
      <option value="design">Design</option>
      <option value="other">Other</option>
    </select>

    <button type="submit">Register Now</button>
  </form>
</div>

<script>
  // Toggle password visibility
  function togglePassword(id, icon) {
    const input = document.getElementById(id);
    if (input.type === "password") {
      input.type = "text";
      icon.textContent = "🙈";
    } else {
      input.type = "password";
      icon.textContent = "👁";
    }
  }

  // Form validation on submit
  document.getElementById("registerForm").addEventListener("submit", function(e) {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (!email.includes("@")) {
      alert("Please enter a valid email!");
      e.preventDefault();
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters!");
      e.preventDefault();
      return;
    }

    if (password !== confirm) {
      alert("Passwords do not match!");
      e.preventDefault();
      return;
    }

    alert("Registration Successful!");
  });
</script>

</body>
</html>
